[default]
# Use color output
color = "auto"
# Run in single-threaded mode to avoid ptrace conflicts with fork/exec in PTY tests
test-threads = 1
# Exclude integration/contract tests that spawn real PTY processes
exclude-files = [
    "tests/integration/*",
    "tests/contract/test_pty_lifecycle.rs",
]
# Timeout per test (seconds) — PTY tests can hang under instrumentation
timeout = 120
# Skip tests that fork/exec (causes segfaults under ptrace instrumentation)
run-types = ["Tests", "Doctests"]
# Output format
out = ["Xml"]
output-dir = "coverage"
